<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store | Parakeet Press</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <header>
    <img src="pp_files/PP_Logo_Original.png" alt="Parakeet Press Logo" style="height:48px;vertical-align:middle;margin-right:12px;border-radius:12px;">
    <a href="index.html" style="text-decoration:none;color:inherit;"><h1 style="display:inline;vertical-align:middle;">PARAKEET PRESS</h1></a>
    <div style="margin-bottom:8px;"></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="store.html">Store</a>
      <a href="chirp.html">Chirp!</a>
    </nav>
  </header>
  <main>
    <section id="store" style="margin-top:2em;">
      <h2>Store</h2>
      <div style="text-align:center;margin-bottom:1.5em;">
        <input id="store-search" type="text" placeholder="Search by title, instrument, or year..." style="width:320px;max-width:90vw;padding:0.6em 1em;border-radius:10px;border:1.5px solid #785c52;font-size:1em;">
      </div>
      <div id="store-cards" class="store-cards"></div>
      <div id="pagination-controls" style="text-align:center;margin:2em 0 1em 0;"></div>
    </section>
  </main>
  <footer>
    <p id="copyright"></p>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var year = new Date().getFullYear();
        var copyright = document.getElementById('copyright');
        if (copyright) {
          copyright.innerHTML = `&copy; ${year} Parakeet Press. All rights reserved.`;
        }
      });
    </script>
  </footer>
  <script>
    // Robust CSV parser for quoted fields
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      return lines.slice(1).map(line => {
        const values = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            values.push(current);
            current = '';
          } else {
            current += char;
          }
        }
        values.push(current);
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = values[i] ? values[i].trim() : '');
        return obj;
      });
    }

    let allProducts = [];
    let currentPage = 1;
    const pageSize = 9;

    function renderStore(products, page = 1) {
      const container = document.getElementById('store-cards');
      const startIdx = (page - 1) * pageSize;
      const endIdx = startIdx + pageSize;
      const pageProducts = products.slice(startIdx, endIdx);
      container.innerHTML = pageProducts.map((p, idx) => {
        const safeTitle = (p.title || '').trim();
        // Try both .jpg and .jpeg extensions
        const imgJpg = `pp_files/pp_store/pp_cover-imgs/${safeTitle}.jpg`;
        const imgJpeg = `pp_files/pp_store/pp_cover-imgs/${safeTitle}.jpeg`;
        // Try .jpg first, then .jpeg if .jpg fails
        let imgTag = `<img src="${imgJpg}" alt="${safeTitle} cover" class="cover-img" onerror="this.onerror=null;this.src='${imgJpeg}';this.onerror=function(){this.style.display='none';}">`;
        const detailUrl = 'product-details.html?id=' + encodeURIComponent(p.id);
        return `
          <div class="product-card" data-id="${encodeURIComponent(p.id)}" tabindex="0" style="cursor:pointer;">
            ${imgTag}
            <h3 style="margin-bottom:0.3em;font-size:1.08em;">${p.title}</h3>
            <div style="font-size:0.98em;color:#785c52;margin-bottom:0.1em;">${p.instrumentation} ${p.duration ? `(${p.duration} min.)` : ''}</div>
            <button class="info-btn" data-id="${encodeURIComponent(p.id)}" style="margin-top:auto;width:100%;font-size:0.98em;" tabindex="-1">
              Buy${(() => {
                if (p.price && p.price.trim()) {
                  const num = parseFloat(p.price.replace(/[^\d.]/g, ''));
                  return isFinite(num) && num > 0 ? ` for $${num.toFixed(2)}` : '';
                }
                return '';
              })()}
            </button>
          </div>
        `;
      }).join('');
      renderPagination(products.length, page);
    }

    function renderPagination(totalItems, page) {
      const controls = document.getElementById('pagination-controls');
      const totalPages = Math.ceil(totalItems / pageSize);
      if (totalPages <= 1) {
        controls.innerHTML = '';
        return;
      }
      let html = '';
      if (page > 1) {
        html += `<button id="prev-page" style="margin:0 1em 0 0;padding:0.5em 1.2em;">Previous</button>`;
      }
      html += `<span style="font-size:1.1em;">Page ${page} of ${totalPages}</span>`;
      if (page < totalPages) {
        html += `<button id="next-page" style="margin:0 0 0 1em;padding:0.5em 1.2em;">Next</button>`;
      }
      controls.innerHTML = html;
      // Add event listeners
      if (page > 1) {
        document.getElementById('prev-page').onclick = function() {
          currentPage--;
          renderStore(allProducts, currentPage);
        };
      }
      if (page < totalPages) {
        document.getElementById('next-page').onclick = function() {
          currentPage++;
          renderStore(allProducts, currentPage);
        };
      }
    }

    fetch('pp_files/pp_store/scoresShop.csv')
      .then(res => res.text())
      .then(text => {
        allProducts = parseCSV(text);
        // Sort in reverse order of the CSV (last row first)
        allProducts = allProducts.reverse();
        renderStore(allProducts, currentPage);
      });

    document.addEventListener('input', function(e) {
      if (e.target && e.target.id === 'store-search') {
        const q = e.target.value.trim().toLowerCase();
        if (!q) {
          currentPage = 1;
          renderStore(allProducts, currentPage);
          return;
        }
        const filtered = allProducts.filter(p =>
          (p.title && p.title.toLowerCase().includes(q)) ||
          (p.instrumentation && p.instrumentation.toLowerCase().includes(q)) ||
          (p.year && p.year.toLowerCase().includes(q))
        );
        currentPage = 1;
        renderStore(filtered, currentPage);
      }
    });

    // Make entire product card clickable
    document.addEventListener('click', function(e) {
      const card = e.target.closest('.product-card');
      if (card) {
        const encodedId = card.getAttribute('data-id');
        if (encodedId) {
          window.location.href = 'product-details.html?id=' + encodedId;
        }
      }
    });
    // Optional: allow keyboard navigation
    document.addEventListener('keydown', function(e) {
      if ((e.key === 'Enter' || e.key === ' ') && document.activeElement.classList.contains('product-card')) {
        const encodedId = document.activeElement.getAttribute('data-id');
        if (encodedId) {
          window.location.href = 'product-details.html?id=' + encodedId;
        }
      }
    });
  </script>
</body>
</html>
